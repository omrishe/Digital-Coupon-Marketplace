
services:
  db:
    image: postgres:17-alpine
    container_name: digital-coupon-db
    environment:
      POSTGRES_USER: coupon_user
      POSTGRES_PASSWORD: coupon_password
      POSTGRES_DB: coupon_db
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U coupon_user -d coupon_db']
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: digital-coupon-backend
    ports:
      - '3000:3000'
    environment:
      - NODE_ENV=development
      - PORT=3000
      - DATABASE_URL=postgres://coupon_user:coupon_password@db:5432/coupon_db
      - JWT_SECRET=supersecret123
      - ADMIN_SECRET_KEY=adminsecretkey
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
